{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/calculate_km.css') }}">
{% endblock %}

{% block content %}
<div class="map-wrapper">
  
  <div class="control-panel">
    <div class="panel-header">
      <h2>Побудова маршруту</h2>
      <p>Розрахуйте відстань та час</p>
    </div>

    <div id="points-container" class="inputs-stack">
      <div class="input-row" data-index="0">
        <div class="icon-marker start">A</div>
        <input type="text" class="route-input" placeholder="Звідки (Місто, адреса)">
      </div>
      
      <div class="input-row" data-index="1">
        <div class="icon-marker end">B</div>
        <input type="text" class="route-input" placeholder="Куди">
      </div>
    </div>

    <div class="actions">
      <button id="add-point" class="btn-text">+ Додати проміжну точку</button>
      <button id="build-route" class="btn-primary">
        <span>Розрахувати</span>
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

    <div id="route-result" class="result-card" style="display: none;">
      <div class="result-item">
        <span class="label">Відстань:</span>
        <span class="value" id="res-distance">0 км</span>
      </div>
      <div class="result-item">
        <span class="label">Час у дорозі:</span>
        <span class="value" id="res-duration">0 год</span>
      </div>
      <div id="legs-details" class="legs-list"></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key={{ google_api_key }}&libraries=places&language=uk&callback=initMap">
</script>
{% endblock %}
